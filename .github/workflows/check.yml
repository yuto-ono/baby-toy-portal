name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check tool versions
        run: |
          mise_node="$(sed -n 's/^node = "\(.*\)"$/\1/p' mise.toml)"
          mise_pnpm="$(sed -n 's/^pnpm = "\(.*\)"$/\1/p' mise.toml)"
          package_node="$(jq -r '.engines.node' package.json)"
          package_pnpm="$(jq -r '.packageManager | sub("^pnpm@"; "")' package.json)"

          test "$mise_node" = "$package_node"
          test "$mise_pnpm" = "$package_pnpm"

      - name: Set up tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checks
        run: pnpm check

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test
